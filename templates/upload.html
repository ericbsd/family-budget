{% extends "base.html" %}
{% block title %}Upload CSV – Family Budget{% endblock %}

{% block content %}
<h4 class="mb-4"><i class="bi bi-upload me-2"></i>Upload CSV</h4>

<div class="row g-4">
    <!-- ── Upload card ─────────────────────────────────────────── -->
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header fw-medium">Import Bank Transactions</div>
            <div class="card-body">

                <!-- Drop zone -->
                <div class="drop-zone" id="dropZone">
                    <input type="file" id="fileInput" accept=".csv,.txt">
                    <i class="bi bi-file-earmark-arrow-up fs-1 text-muted d-block mb-2"></i>
                    <div class="fw-medium mb-1">Drag &amp; drop your CSV file here</div>
                    <div class="text-muted small mb-3">or click to browse</div>
                    <button type="button" class="btn btn-sm btn-outline-primary"
                            onclick="document.getElementById('fileInput').click()">
                        Browse Files
                    </button>
                </div>

                <!-- File info (shown after selection) -->
                <div id="fileInfo" class="d-none mt-3">
                    <div class="d-flex align-items-center gap-2 p-3 border rounded mb-3">
                        <i class="bi bi-file-earmark-text fs-4 text-primary"></i>
                        <div class="flex-grow-1" style="min-width:0">
                            <div class="fw-medium text-truncate" id="fileName"></div>
                            <div class="text-muted small"      id="fileSize"></div>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary" id="clearFileBtn">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary flex-fill" id="validateBtn">
                            <i class="bi bi-check2-circle me-1"></i>Validate
                        </button>
                        <button class="btn btn-primary flex-fill" id="uploadBtn">
                            <i class="bi bi-upload me-1"></i>Import
                        </button>
                    </div>
                </div>

                <!-- Validate result -->
                <div id="validateResult" class="d-none mt-3"></div>

                <!-- Upload result -->
                <div id="uploadResult" class="d-none mt-3"></div>
            </div>
        </div>
    </div>

    <!-- ── Upload history ─────────────────────────────────────── -->
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center fw-medium">
                Upload History
                <button class="btn btn-sm btn-outline-secondary" id="refreshHistoryBtn" title="Refresh">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
            <div class="card-body p-0" style="max-height:500px;overflow-y:auto">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-sticky-head">
                        <tr>
                            <th>File</th>
                            <th>Date</th>
                            <th class="text-end">Rows</th>
                            <th class="text-end">Auto-cat</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="5" class="text-center text-muted py-4">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/upload.js') }}"></script>
{% endblock %}
