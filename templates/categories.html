{% extends "base.html" %}
{% block title %}Categories – Family Budget{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-tags me-2"></i>Categories</h4>
    <button class="btn btn-sm btn-primary" id="addCategoryBtn">
        <i class="bi bi-plus-lg me-1"></i>Add Category
    </button>
</div>

<div class="row g-3" id="categoriesGrid">
    <div class="col-12 text-center text-muted py-5">Loading…</div>
</div>

<!-- ── Add / Edit Modal ────────────────────────────────────────── -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="categoryModalTitle">Add Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="catEditId">
                <div class="mb-3">
                    <label class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="catName" placeholder="e.g. Groceries">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" class="form-control" id="catDescription"
                           placeholder="e.g. Food &amp; household items">
                </div>
                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label">Colour</label>
                        <input type="hidden" id="catColor" value="#4CAF50">
                        <div class="d-flex gap-2 align-items-center mb-2">
                            <div id="catColorSwatch"
                                 style="width:2.2rem;height:2.2rem;border-radius:.375rem;background:#4CAF50;flex-shrink:0;border:2px solid rgba(0,0,0,.15)"></div>
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                    id="randomizeColorBtn" title="Random colour">
                                <i class="bi bi-shuffle"></i> Random
                            </button>
                            <label class="btn btn-sm btn-outline-secondary mb-0"
                                   title="Open colour picker" style="cursor:pointer">
                                <i class="bi bi-eyedropper"></i> Custom
                                <input type="color" id="catColorPicker" value="#4CAF50"
                                       style="position:absolute;width:0;height:0;opacity:0;pointer-events:none">
                            </label>
                        </div>
                        <div id="colorPalette"
                             style="display:grid;grid-template-columns:repeat(7,1.8rem);gap:.25rem"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Monthly Limit</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" min="0" class="form-control"
                                   id="catLimit" placeholder="0.00">
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveCategoryBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- ── Delete Confirm Modal ────────────────────────────────────── -->
<div class="modal fade" id="deleteCatModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Delete <strong id="deleteCatName"></strong>?</p>
                <p class="text-muted small mb-0">
                    Categories with existing transactions cannot be deleted.
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteCatBtn">Delete</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/categories.js') }}"></script>
{% endblock %}
